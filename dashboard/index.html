<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDPS Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
        }

        /* 헤더 */
        header {
            background: #111827;
            border-bottom: 2px solid #1e3a5f;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 22px;
            color: #60a5fa;
            letter-spacing: 2px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* 메인 레이아웃 */
        main {
            padding: 24px 32px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        /* 카드 */
        .card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 20px;
        }

        .card.full  { grid-column: span 4; }
        .card.half  { grid-column: span 2; }
        .card.quart { grid-column: span 1; }

        .card h2 {
            font-size: 13px;
            color: #60a5fa;
            letter-spacing: 1px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        /* 통계 숫자 */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: #0d1520;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
        }

        .stat-box .num {
            font-size: 36px;
            font-weight: bold;
            line-height: 1;
        }

        .stat-box .label {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .critical { color: #ef4444; }
        .high     { color: #f97316; }
        .medium   { color: #eab308; }
        .low      { color: #22c55e; }
        .total    { color: #60a5fa; }

        /* 경보 테이블 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            color: #60a5fa;
            border-bottom: 1px solid #1e3a5f;
            font-size: 11px;
            letter-spacing: 1px;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #0d1520;
            color: #cbd5e1;
        }

        tr:hover td { background: #0d1520; }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge.CRITICAL { background: #7f1d1d; color: #ef4444; }
        .badge.HIGH     { background: #7c2d12; color: #f97316; }
        .badge.MEDIUM   { background: #713f12; color: #eab308; }
        .badge.MEDIUM   { background: #713f12; color: #eab308; }
        .badge.LOW      { background: #14532d; color: #22c55e; }

        /* 차트 */
        .chart-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .chart-bar .bar-label {
            width: 80px;
            font-size: 12px;
            color: #94a3b8;
        }

        .chart-bar .bar-track {
            flex: 1;
            background: #0d1520;
            border-radius: 4px;
            height: 20px;
            overflow: hidden;
        }

        .chart-bar .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .chart-bar .bar-count {
            width: 40px;
            text-align: right;
            font-size: 12px;
            color: #60a5fa;
        }

        /* 격리 프로세스 */
        .process-item {
            background: #0d1520;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .process-item .pid {
            font-size: 18px;
            color: #ef4444;
            font-weight: bold;
        }

        .process-item .info {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .isolated-badge {
            background: #7f1d1d;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
        }

        /* 버튼 */
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }

        .btn-primary {
            background: #1d4ed8;
            color: white;
        }

        .btn-danger {
            background: #7f1d1d;
            color: #ef4444;
        }

        /* 업데이트 시각 */
        .update-time {
            font-size: 11px;
            color: #475569;
            text-align: right;
            margin-top: 8px;
        }

        /* 빈 상태 */
        .empty {
            text-align: center;
            color: #475569;
            padding: 24px;
            font-size: 13px;
        }

        /* 로그 */
        .log-box {
            background: #0d1520;
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            color: #94a3b8;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.8;
        }

        .log-box .log-line { border-bottom: 1px solid #111827; padding: 2px 0; }
        .log-box .log-line:last-child { border: none; }
    </style>
</head>
<body>

<header>
    <h1>⚡ IDPS DASHBOARD</h1>
    <div class="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">연결 중...</span>
        <span style="color:#475569; margin-left:16px;">포트 8080</span>
    </div>
</header>

<main>

    <!-- 통계 카드 -->
    <div class="card full">
        <h2>📊 경보 통계</h2>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="num total"  id="stat-total">-</div>
                <div class="label">TOTAL</div>
            </div>
            <div class="stat-box">
                <div class="num critical" id="stat-critical">-</div>
                <div class="label">CRITICAL</div>
            </div>
            <div class="stat-box">
                <div class="num high"     id="stat-high">-</div>
                <div class="label">HIGH</div>
            </div>
            <div class="stat-box">
                <div class="num medium"   id="stat-medium">-</div>
                <div class="label">MEDIUM</div>
            </div>
        </div>
    </div>

    <!-- 차트 -->
    <div class="card half">
        <h2>📈 등급별 분포</h2>
        <div id="chart">
            <div class="chart-bar">
                <span class="bar-label">CRITICAL</span>
                <div class="bar-track">
                    <div class="bar-fill" id="bar-critical"
                         style="width:0%;background:#ef4444;"></div>
                </div>
                <span class="bar-count" id="cnt-critical">0</span>
            </div>
            <div class="chart-bar">
                <span class="bar-label">HIGH</span>
                <div class="bar-track">
                    <div class="bar-fill" id="bar-high"
                         style="width:0%;background:#f97316;"></div>
                </div>
                <span class="bar-count" id="cnt-high">0</span>
            </div>
            <div class="chart-bar">
                <span class="bar-label">MEDIUM</span>
                <div class="bar-track">
                    <div class="bar-fill" id="bar-medium"
                         style="width:0%;background:#eab308;"></div>
                </div>
                <span class="bar-count" id="cnt-medium">0</span>
            </div>
            <div class="chart-bar">
                <span class="bar-label">LOW</span>
                <div class="bar-track">
                    <div class="bar-fill" id="bar-low"
                         style="width:0%;background:#22c55e;"></div>
                </div>
                <span class="bar-count" id="cnt-low">0</span>
            </div>
        </div>
    </div>

    <!-- 격리 프로세스 -->
    <div class="card half">
        <h2>🔒 격리된 프로세스</h2>
        <div id="sandbox-list">
            <div class="empty">격리된 프로세스 없음</div>
        </div>
    </div>

    <!-- 경보 목록 -->
    <div class="card full">
        <h2>🚨 최근 경보</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>등급</th>
                    <th>룰</th>
                    <th>패턴</th>
                    <th>출발지</th>
                    <th>목적지</th>
                    <th>시각</th>
                </tr>
            </thead>
            <tbody id="alert-table">
                <tr><td colspan="7" class="empty">경보 없음</td></tr>
            </tbody>
        </table>
        <div class="update-time" id="update-time">-</div>
    </div>

    <!-- 제어 패널 -->
    <div class="card half">
        <h2>⚙️ 제어 패널</h2>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="reloadRules()">
                🔄 룰 재로드
            </button>
            <button class="btn btn-primary" onclick="fetchAll()">
                ↺ 새로고침
            </button>
        </div>
        <div id="reload-result" style="margin-top:12px;font-size:12px;color:#22c55e;"></div>
    </div>

    <!-- 이벤트 로그 -->
    <div class="card half">
        <h2>📋 이벤트 로그</h2>
        <div class="log-box" id="event-log">
            <div class="log-line" style="color:#475569">대기 중...</div>
        </div>
    </div>

</main>

<script>
const API = 'http://localhost:8080';
let logLines = [];

function addLog(msg) {
    const now = new Date().toLocaleTimeString();
    logLines.unshift(`[${now}] ${msg}`);
    if (logLines.length > 20) logLines.pop();
    document.getElementById('event-log').innerHTML =
        logLines.map(l => `<div class="log-line">${l}</div>`).join('');
}

// 상태 조회
async function fetchStatus() {
    try {
        const r = await fetch(`${API}/api/status`);
        const d = await r.json();
        document.getElementById('status-dot').style.background  = '#22c55e';
        document.getElementById('status-text').textContent = '🟢 RUNNING';
    } catch {
        document.getElementById('status-dot').style.background  = '#ef4444';
        document.getElementById('status-text').textContent = '🔴 연결 끊김';
    }
}

// 통계 조회
async function fetchStats() {
    try {
        const r = await fetch(`${API}/api/alerts/stats`);
        const d = await r.json();

        document.getElementById('stat-total').textContent    = d.total;
        document.getElementById('stat-critical').textContent = d.critical;
        document.getElementById('stat-high').textContent     = d.high;
        document.getElementById('stat-medium').textContent   = d.medium;

        const max = Math.max(d.critical, d.high, d.medium, d.low, 1);
        document.getElementById('bar-critical').style.width = (d.critical/max*100) + '%';
        document.getElementById('bar-high').style.width     = (d.high/max*100)     + '%';
        document.getElementById('bar-medium').style.width   = (d.medium/max*100)   + '%';
        document.getElementById('bar-low').style.width      = (d.low/max*100)      + '%';

        document.getElementById('cnt-critical').textContent = d.critical;
        document.getElementById('cnt-high').textContent     = d.high;
        document.getElementById('cnt-medium').textContent   = d.medium;
        document.getElementById('cnt-low').textContent      = d.low;
    } catch(e) {
        addLog('통계 조회 실패: ' + e.message);
    }
}

// 경보 목록 조회
async function fetchAlerts() {
    try {
        const r = await fetch(`${API}/api/alerts?limit=20`);
        const d = await r.json();
        const tbody = document.getElementById('alert-table');

        if (d.alerts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty">경보 없음</td></tr>';
            return;
        }

        tbody.innerHTML = d.alerts.map(a => `
            <tr>
                <td style="color:#475569">#${a.id}</td>
                <td><span class="badge ${a.severity}">${a.severity}</span></td>
                <td>${a.rule_name}</td>
                <td style="color:#60a5fa">${a.pattern}</td>
                <td>${a.src_ip}:${a.src_port}</td>
                <td>${a.dst_ip}:${a.dst_port}</td>
                <td style="color:#475569">${a.timestamp}</td>
            </tr>
        `).join('');

        document.getElementById('update-time').textContent =
            '마지막 업데이트: ' + new Date().toLocaleTimeString();
    } catch(e) {
        addLog('경보 조회 실패: ' + e.message);
    }
}

// 격리 프로세스 조회
async function fetchSandbox() {
    try {
        const r = await fetch(`${API}/api/sandbox`);
        const d = await r.json();
        const el = document.getElementById('sandbox-list');

        if (d.isolated.length === 0) {
            el.innerHTML = '<div class="empty">격리된 프로세스 없음</div>';
            return;
        }

        el.innerHTML = d.isolated.map(p => `
            <div class="process-item">
                <div>
                    <div class="pid">PID ${p.pid}</div>
                    <div class="info">
                        ${p.src_ip} | ${p.rule_id} | ${p.isolated_at}
                    </div>
                </div>
                <span class="isolated-badge">🔒 ${p.severity}</span>
            </div>
        `).join('');

        addLog(`격리 프로세스 ${d.count}개 감지`);
    } catch(e) {
        addLog('샌드박스 조회 실패: ' + e.message);
    }
}

// 룰 재로드
async function reloadRules() {
    try {
        const r = await fetch(`${API}/api/rules/reload`, { method: 'POST' });
        const d = await r.json();
        document.getElementById('reload-result').textContent =
            d.success ? '✅ ' + d.message : '❌ ' + d.message;
        addLog('룰 재로드: ' + d.message);
    } catch(e) {
        addLog('룰 재로드 실패: ' + e.message);
    }
}

// 전체 갱신
async function fetchAll() {
    await fetchStatus();
    await fetchStats();
    await fetchAlerts();
    await fetchSandbox();
    addLog('데이터 갱신 완료');
}

// 초기 로드 + 5초마다 자동 갱신
fetchAll();
setInterval(fetchAll, 5000);
</script>

</body>
</html>
